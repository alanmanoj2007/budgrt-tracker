<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alsa – Track Your Budget</title>
  <link href="https://fonts.googleapis.com/css2?family=Odibee+Sans&family=Google+Sans+Flex:opsz,wdth,wght@6..144,50..150,100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-wordmark">Alsa</span>
      <span class="logo-tagline">track<br>your<br>budget</span>
    </div>
    <div class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </div>
  </header>

  <div class="main-grid">

    <!-- LEFT CARD -->
    <div class="card">
      <div class="card-header">
        <h2 id="income-display">Income: Rs.120000</h2>
      </div>

      <div class="card-body">
        <p class="month-label" id="month-label">May</p>

        <div class="carousel-wrapper">
          <button class="carousel-arrow" id="prev-week" aria-label="Previous">&#8249;</button>
          <div class="carousel-track" id="carousel-track"></div>
          <button class="carousel-arrow" id="next-week" aria-label="Next">&#8250;</button>
        </div>

        <div class="entry-form">
          <input type="number" id="amount-input" placeholder="amount" />
          <button class="btn btn-add" id="add-btn">ADD</button>
          <input type="text" id="desc-input" placeholder="description" />
          <button class="btn btn-remove" id="remove-btn">REMOVE</button>
        </div>
      </div>

      <div class="card-footer">
        <p id="balance-display">Balance: Rs.120000</p>
      </div>
    </div>

    <!-- RIGHT CARD -->
    <div class="card">
      <div class="history-header">
        <h2>HISTORY</h2>
      </div>

      <div class="history-list" id="history-list"></div>

      <div class="history-footer">
        <p id="history-total">Rs.0</p>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
